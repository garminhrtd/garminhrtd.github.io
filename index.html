<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>職入你心｜你的職能光譜</title>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
/* 
  全新風格：手帳風、活潑、粉嫩色彩
  參考「職入你心」海報視覺
*/
:root {
  /* 基礎色 */
  --bg-color: #FFFDF5; /* 暖黃底色 */
  --text-main: #333333;
  --text-blue: #3FA9F5; /* 標題藍 */
  --text-yellow: #FFDE59; /* 標題陰影黃 */
  
  /* 裝飾線與卡片 */
  --card-bg: #FFFFFF;
  --dash-blue: #3FA9F5;
  --border-radius: 24px;
  
  /* 六大職能專屬色 (對應海報磁鐵) */
  --c-trust: #BFE2F2;    /* 贏得信任 - 粉藍 */
  --c-coop: #CDE3B6;     /* 合作 - 粉綠 */
  --c-learn: #F6E2B9;    /* 持續學習 - 橘黃 */
  --c-init: #EDA8A3;     /* 積極主動 - 粉紅 */
  --c-reason: #C8C5D6;   /* 應用推理 - 粉紫 */
  --c-adapt: #D5C2B6;    /* 適應力 - 大地色 */

  --font-main: 'Varela Round', 'Noto Sans TC', sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--font-main);
  color: var(--text-main);
  background-color: var(--bg-color);
  /* 點陣背景圖案 */
  background-image: radial-gradient(#F2E4A8 1.5px, transparent 1.5px);
  background-size: 20px 20px;
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 30px 20px 80px;
  min-height: 100vh;
}

/* --- 動畫 --- */
.screen { animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes bounceIn {
  0% { opacity: 0; transform: scale(0.95) translateY(20px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

/* --- 標題 (職入你心風格) --- */
.hero-header { text-align: center; margin-bottom: 30px; }
.hero-title {
  font-size: 3.5rem;
  font-weight: 900;
  margin: 0;
  color: var(--text-blue);
  /* 粗體藍字 + 黃色立體陰影 */
  text-shadow: 
    3px 3px 0 var(--text-yellow),
    4px 4px 0 var(--text-yellow),
    5px 5px 0 var(--text-yellow);
  letter-spacing: 2px;
}
.hero-subtitle {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-blue);
  background: #fff;
  display: inline-block;
  padding: 4px 16px;
  border-radius: 20px;
  border: 2px dashed var(--text-blue);
  margin-top: 10px;
}

/* --- 卡片風格 (虛線邊框手帳風) --- */
.card {
  background: var(--card-bg);
  border: 3px dashed var(--dash-blue);
  border-radius: var(--border-radius);
  padding: 35px 25px;
  box-shadow: 0 8px 0 rgba(63, 169, 245, 0.1); /* 底部厚度 */
  margin-bottom: 25px;
}

/* --- 表單 --- */
.form-group { margin-bottom: 22px; }
.form-group label {
  display: block;
  font-weight: 700;
  margin-bottom: 8px;
  color: #555;
  font-size: 1.05rem;
}
.form-group input {
  width: 100%;
  padding: 15px;
  border: 2px solid #E0E0E0;
  border-radius: 12px;
  font-family: inherit;
  font-size: 1rem;
  background: #FAFAFA;
  transition: all 0.2s;
}
.form-group input:focus {
  outline: none;
  border-color: var(--text-blue);
  background: #FFF;
  box-shadow: 0 0 0 3px rgba(63, 169, 245, 0.2);
}

.form-group input:required:invalid {
  border-color: #E0E0E0;
}

/* --- 按鈕 --- */
.btn-primary {
  width: 100%;
  background: var(--text-blue);
  color: #fff;
  border: none;
  cursor: pointer;
  font-weight: 700;
  font-size: 1.2rem;
  padding: 16px;
  border-radius: 99px;
  transition: all 0.2s;
  box-shadow: 0 6px 0 #2A7DBA; /* 立體按鈕 */
}
.btn-primary:hover:not(:disabled) {
  transform: translateY(2px);
  box-shadow: 0 4px 0 #2A7DBA;
}
.btn-primary:active:not(:disabled) {
  transform: translateY(6px);
  box-shadow: 0 0 0 #2A7DBA;
}
.btn-primary:disabled {
  background: #CCCCCC;
  box-shadow: 0 6px 0 #AAAAAA;
  cursor: not-allowed;
  transform: none;
}

.btn-ghost {
  background: transparent;
  border: 2px solid var(--text-blue);
  color: var(--text-blue);
  font-weight: 700;
  padding: 12px 20px;
  border-radius: 99px;
  cursor: pointer;
}

/* --- 測驗頁面 --- */
.qhead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.q-progress-bar {
  flex: 1;
  height: 12px;
  background: #EEEEEE;
  border-radius: 10px;
  margin-right: 15px;
  overflow: hidden;
}
.q-progress-fill {
  height: 100%;
  background: var(--text-yellow); /* 亮黃色進度條 */
  border-radius: 10px;
  transition: width 0.4s ease-out;
}
.q-count { font-weight: 900; font-size: 1.2rem; color: var(--text-blue); }

.q-title {
  font-size: 1.35rem;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 25px;
}

/* 選項按鈕 */
.opt {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  background: #FFFFFF;
  border: 2px solid #E0E0E0;
  border-radius: 16px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 700;
  color: #555;
}
.opt:hover {
  border-color: var(--text-blue);
  background: #F4FAFF;
}
.opt.sel {
  border-color: var(--text-blue);
  background: #E8F4FD;
  box-shadow: 0 4px 0 rgba(63, 169, 245, 0.2);
  transform: translateY(-2px);
}
.opt-letter {
  flex: 0 0 auto;
  width: 32px;
  height: 32px;
  background: #EEEEEE;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 15px;
  color: #888;
}
.opt.sel .opt-letter {
  background: var(--text-blue);
  color: #FFF;
}

/* 自評區塊 (動物格子) */
.self-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}
.self-card {
  background: #FFF;
  border: 2px solid #E0E0E0;
  border-radius: 16px;
  padding: 20px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.self-card:hover { border-color: var(--text-blue); transform: scale(1.02); }
.self-card.sel { border-color: var(--text-blue); background: #E8F4FD; box-shadow: 0 4px 0 rgba(63, 169, 245, 0.2); }
.sc-emoji { font-size: 2.5rem; margin-bottom: 5px; }
.sc-title { font-weight: 900; color: #333; }

/* --- 結果頁面 --- */
.result-hero {
  text-align: center;
  padding-bottom: 20px;
  border-bottom: 2px dashed #E0E0E0;
  margin-bottom: 25px;
}
.rh-title { font-size: 1.2rem; color: #666; font-weight: 700; margin-bottom: 5px; }
.rh-animal { font-size: 5rem; margin: 10px 0; animation: jump 1s ease infinite alternate; }
@keyframes jump { from { transform: translateY(0); } to { transform: translateY(-15px); } }
.rh-trait { font-size: 2.2rem; font-weight: 900; margin: 0; }

.radar-container {
  width: 100%;
  max-width: 350px;
  margin: 0 auto 30px;
}

/* 職能解說卡 */
.feedback-card {
  background: #FAFAFA;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}
.fc-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;}
.fc-title.strength { color: #E75480; } /* 亮粉色 */
.fc-title.develop { color: #F29C38; }  /* 橘黃色 */

.course-link {
  display: block;
  text-align: center;
  background: #FFFFFF;
  border: 2px solid #F29C38;
  color: #F29C38;
  text-decoration: none;
  font-weight: 900;
  padding: 12px;
  border-radius: 12px;
  margin-top: 15px;
  transition: 0.2s;
}
.course-link:hover { background: #F29C38; color: #FFF; }

/* 探索資源卡片 */
.explore-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-top: 15px;
}
.explore-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 10px;
  background: #FFFFFF;
  border: 3px dashed #E0E0E0;
  border-radius: 16px;
  text-decoration: none;
  transition: all 0.2s;
}
.explore-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 6px 0 rgba(0,0,0,0.05);
}
.ec-emoji { font-size: 2.8rem; margin-bottom: 8px; }
.ec-title { font-weight: 900; font-size: 1.1rem; }

/* --- 職能動物圖片：透明底無框無文字版 --- */
.competency-showcase {
  position: relative;
  margin: 14px auto 24px;
  padding: 0;
  background: transparent;
  border: none;
  border-radius: 0;
  box-shadow: none;
  overflow: visible;
}
.competency-showcase::before,
.competency-showcase::after {
  content: none;
}
.competency-strip {
  position: relative;
  z-index: 1;
  width: 100%;
  display: block;
  border-radius: 0;
}
.competency-hint {
  display: none;
}
@media (max-width: 480px) {
  .hero-title { font-size: 2.8rem; }
  .competency-showcase { margin: 12px auto 22px; }
}


</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  // TODO: 貼上你的 Google Apps Script Web App URL
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGPAUvi-eQ37Vfh2aEzniCETlL65-i5L2ZHPcSnaBfEBy6JfvnHspdy_RBE0ayVebU/exec";
  const QUIZ_SHARE_URL = "https://garminhrtd.github.io/";

  const sendToGoogleSheet = (payload) => {
    if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("請貼上")) {
      console.warn("尚未設定 GOOGLE_SCRIPT_URL，資料不會送出", payload);
      return Promise.resolve();
    }

    // 用隱藏表單 POST 到 Apps Script，避免 GitHub Pages → Apps Script 的 CORS 問題。
    // 同時送出 payload(JSON) 與各欄位，讓 Apps Script 兩種寫法都收得到。
    return new Promise((resolve, reject) => {
      try {
        const iframeName = "google_sheet_submit_iframe_" + Date.now();
        const iframe = document.createElement("iframe");
        iframe.name = iframeName;
        iframe.style.display = "none";
        document.body.appendChild(iframe);

        const form = document.createElement("form");
        form.method = "POST";
        form.action = GOOGLE_SCRIPT_URL;
        form.target = iframeName;
        form.style.display = "none";
        form.enctype = "application/x-www-form-urlencoded";

        const appendInput = (name, value) => {
          const input = document.createElement("input");
          input.type = "hidden";
          input.name = name;
          input.value = typeof value === "string" ? value : JSON.stringify(value ?? "");
          form.appendChild(input);
        };

        appendInput("payload", payload);
        appendInput("submittedAt", payload.submittedAt || "");
        appendInput("name", payload.name || "");
        appendInput("employeeId", payload.employeeId || "");
        appendInput("department", payload.department || "");
        appendInput("topTrait", payload.topTrait || "");
        appendInput("selfEval", payload.selfEval || "");
        appendInput("answers", payload.answers || "");
        appendInput("scores", payload.scores || {});

        document.body.appendChild(form);

        let finished = false;
        iframe.onload = () => {
          if (finished) return;
          finished = true;
          setTimeout(() => {
            form.remove();
            iframe.remove();
          }, 300);
          resolve();
        };

        form.submit();

        // Apps Script 有時不觸發 iframe onload；3 秒後仍視為已送出，避免畫面卡住
        setTimeout(() => {
          if (!finished) {
            finished = true;
            form.remove();
            iframe.remove();
            resolve();
          }
        }, 3000);
      } catch (error) {
        reject(error);
      }
    });
  };

  // --- 資料定義 ---
  const TRAITS = {

  const FEEDBACK = {
    "贏得信任": { s: "你是建立團隊安全感不可或缺的角色，做事踏實、說到做到。", d: "試著在早期就拉入團隊一起討論，適度展現脆弱反而能凝聚共識。" },

    "積極主動": { s: "你不滿足於及格邊緣，總是主動多走一哩路，帶動整個團隊的節奏。", d: "行動力滿分！但要留意確保其他同事的腳步也能跟上你的規劃。" },
    "應用推理": { s: "面對複雜的問題，你能冷靜拆解變因，用數據與事實說話。", d: "在溝通解法時，如果能多加一點對「人」的同理，你的建議會更容易被接受。" },
    "適應力": { s: "當計畫趕不上變化時，你總能保持彈性，冷靜面對不確定性。", d: "如果能進一步把調整背後的邏輯分享給團隊，大家會更安心。" }
  };

  const QUESTIONS = [
    { text: "跨部門推動新專案，初期目標未對齊。你最自然的反應是？", opts: [
      { l: "A", t: "先準備好自己部分，等分工清楚再動", s: {"贏得信任":2, "應用推理":1} },
      { l: "B", t: "主動約窗口聊，對齊期待和目標", s: {"合作":2, "積極主動":1} },
      { l: "C", t: "對齊目標，整理結論分享給所有人", s: {"合作":2, "贏得信任":1} },
      { l: "D", t: "先擬初步草案，丟出來讓大家討論修正", s: {"積極主動":2, "合作":1} }
    ]},
    { text: "發現自己判斷錯誤影響進度，主管還不知道。你會？", opts: [
      { l: "A", t: "私下補救，盡量在主管發現前處理好", s: {"贏得信任":2, "適應力":1} },

      { l: "C", t: "用數據重新檢視，整理清楚再說明", s: {"應用推理":2, "贏得信任":1} },
      { l: "D", t: "主動承認並把這次學習分享給團隊", s: {"持續學習":2, "贏得信任":1} }
    ]},
    { text: "部門導入不熟悉的新工具，你的第一反應是？", opts: [
      { l: "A", t: "先觀察別人怎麼用，等成熟再跟上", s: {"適應力":2, "贏得信任":1} },
      { l: "B", t: "主動找資料問同事，先把基本弄懂", s: {"持續學習":2, "積極主動":1} },
      { l: "C", t: "學會操作並試著找出應用在工作上的方式", s: {"持續學習":2, "應用推理":1} },
      { l: "D", t: "評估對團隊長期影響，並協助大家上手", s: {"積極主動":2, "持續學習":1} }
    ]},
    { text: "客戶需求與真正想解決的問題不符。你會？", opts: [
      { l: "A", t: "照客戶說的需求做，畢竟那是他要的", s: {"贏得信任":2, "合作":1} },
      { l: "B", t: "把需求做好，做完後再順便提我的觀察", s: {"贏得信任":2, "積極主動":1} },
      { l: "C", t: "主動跟客戶確認真正的問題再執行", s: {"應用推理":2, "合作":1} },

    ]},
    { text: "主管宣布轉做不熟悉的新方向，你有些疑慮。你會？", opts: [

  // --- APP 元件 ---
  const App = () => {
    const [step, setStep] = useState('intro'); 
    const [formData, setFormData] = useState({});
    const [answers, setAnswers] = useState([]);
    const [selfEval, setSelfEval] = useState('');

    const startQuiz = (data) => { setFormData(data); setStep('quiz'); };
    const finishQuiz = (ans) => { setAnswers(ans); setStep('self'); };
    const finishSelf = (trait) => { setSelfEval(trait); setStep('result'); };
    const goExplore = () => { setStep('explore'); };

    return (
      <div className="container">
        {step === 'intro' && <IntroScreen onStart={startQuiz} />}
        {step === 'quiz' && <QuizScreen onFinish={finishQuiz} />}
        {step === 'self' && <SelfScreen onFinish={finishSelf} />}
        {step === 'result' && <ResultScreen formData={formData} answers={answers} selfEval={selfEval} onNext={goExplore} />}
        {step === 'explore' && <ExploreScreen />}
      </div>
    );
  };

  // --- 結果頁面 ---
  const ResultScreen = ({ formData, answers, selfEval, onNext }) => {
    const canvasRef = useRef(null);
    const keys = Object.keys(TRAITS);
    const [submitStatus, setSubmitStatus] = useState('sending');
    const [shareStatus, setShareStatus] = useState('');
    
    // 計算分數
    let scores = { "贏得信任":0, "合作":0, "持續學習":0, "積極主動":0, "應用推理":0, "適應力":0 };
    answers.forEach(a => {
      Object.keys(a.s).forEach(k => scores[k] += a.s[k]);
    });
    
    // 找最高分
    let topTrait = keys[0];
    keys.forEach(k => { if(scores[k] > scores[topTrait]) topTrait = k; });
    const topData = TRAITS[topTrait];
    const fb = FEEDBACK[topTrait];

    const canvasToBlob = (canvas) => new Promise((resolve, reject) => {
      canvas.toBlob((blob) => {
        if (blob) resolve(blob);
        else reject(new Error('無法產生結果圖片'));
      }, 'image/png', 0.95);
    });

    const drawWrappedText = (ctx, text, x, y, maxWidth, lineHeight) => {
      const chars = Array.from(text);
      let line = '';
      let lines = [];
      chars.forEach(ch => {
        const testLine = line + ch;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = ch;
        } else {
          line = testLine;
        }
      });
      if (line) lines.push(line);
      lines.forEach((ln, i) => ctx.fillText(ln, x, y + i * lineHeight));
      return y + lines.length * lineHeight;
    };

    const drawRadarChart = (ctx, cx, cy, radius) => {
      const maxScore = 20;
      const angles = keys.map((_, i) => -Math.PI / 2 + i * Math.PI * 2 / keys.length);

      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // 背景格線
      ctx.strokeStyle = '#DDECF8';
      ctx.lineWidth = 2;
      [0.25, 0.5, 0.75, 1].forEach(level => {
        ctx.beginPath();
        angles.forEach((angle, i) => {
          const x = cx + Math.cos(angle) * radius * level;
          const y = cy + Math.sin(angle) * radius * level;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.stroke();
      });

      // 軸線與標籤
      ctx.strokeStyle = '#E8E8E8';
      ctx.fillStyle = '#333333';
      ctx.font = '700 24px "Noto Sans TC", sans-serif';
      angles.forEach((angle, i) => {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
        ctx.stroke();

        const labelX = cx + Math.cos(angle) * (radius + 82);
        const labelY = cy + Math.sin(angle) * (radius + 52);
        const trait = keys[i];
        ctx.fillText(`${TRAITS[trait].emoji}`, labelX, labelY - 18);
        ctx.fillText(trait, labelX, labelY + 18);
      });

      // 結果雷達圖
      ctx.beginPath();
      keys.forEach((k, i) => {
        const value = Math.max(0, Math.min(scores[k] / maxScore, 1));
        const x = cx + Math.cos(angles[i]) * radius * value;
        const y = cy + Math.sin(angles[i]) * radius * value;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fillStyle = topData.color + '99';
      ctx.strokeStyle = topData.color;
      ctx.lineWidth = 6;
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = topData.color;
      keys.forEach((k, i) => {
        const value = Math.max(0, Math.min(scores[k] / maxScore, 1));
        const x = cx + Math.cos(angles[i]) * radius * value;
        const y = cy + Math.sin(angles[i]) * radius * value;
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    };

    const roundRect = (ctx, x, y, w, h, r) => {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    };

    const generateResultImage = async () => {
      const canvas = document.createElement('canvas');
      canvas.width = 1080;
      canvas.height = 1350;
      const ctx = canvas.getContext('2d');

      // 背景：保留原網頁暖黃色手帳風，但輸出成乾淨圖片
      ctx.fillStyle = '#FFFDF5';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#F2E4A8';
      for (let x = 18; x < canvas.width; x += 42) {
        for (let y = 18; y < canvas.height; y += 42) {
          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // 主卡片
      ctx.fillStyle = '#FFFFFF';
      roundRect(ctx, 70, 70, 940, 1210, 46);
      ctx.fill();

      ctx.textAlign = 'center';
      ctx.fillStyle = '#3FA9F5';
      ctx.font = '900 76px "Noto Sans TC", sans-serif';
      ctx.fillText('職入你心', 540, 175);
      ctx.fillStyle = '#555555';
      ctx.font = '700 34px "Noto Sans TC", sans-serif';
      ctx.fillText('我的職能測驗結果', 540, 230);

      ctx.font = '120px "Apple Color Emoji", "Segoe UI Emoji", sans-serif';
      ctx.fillText(topData.emoji, 540, 380);

      ctx.fillStyle = topData.color;
      ctx.font = '900 76px "Noto Sans TC", sans-serif';
      ctx.fillText(topTrait, 540, 480);
      ctx.fillStyle = '#666666';
      ctx.font = '700 30px "Noto Sans TC", sans-serif';
      ctx.fillText('我的職場代表動物', 540, 525);

      // 雷達圖區塊（分享圖不顯示分數，只呈現測驗結果光譜）
      ctx.textAlign = 'center';
      ctx.fillStyle = '#F7FAFF';
      roundRect(ctx, 130, 575, 820, 320, 30);
      ctx.fill();
      ctx.fillStyle = '#333333';
      ctx.font = '900 34px "Noto Sans TC", sans-serif';
      ctx.fillText('職能光譜雷達圖', 540, 630);
      drawRadarChart(ctx, 540, 765, 95);

      // 文字結果
      ctx.textAlign = 'left';
      ctx.fillStyle = '#FFF6FA';
      roundRect(ctx, 130, 925, 820, 145, 30);
      ctx.fill();
      ctx.fillStyle = '#E75480';
      ctx.font = '900 30px "Noto Sans TC", sans-serif';
      ctx.fillText('✨ 我的超能力', 170, 980);
      ctx.fillStyle = '#333333';
      ctx.font = '700 27px "Noto Sans TC", sans-serif';
      drawWrappedText(ctx, fb.s, 170, 1025, 740, 38);

      ctx.fillStyle = '#FFF9E6';
      roundRect(ctx, 130, 1095, 820, 115, 30);
      ctx.fill();
      ctx.fillStyle = '#F29C38';
      ctx.font = '900 30px "Noto Sans TC", sans-serif';
      ctx.fillText('🌱 可以伸展的空間', 170, 1145);
      ctx.fillStyle = '#333333';
      ctx.font = '700 26px "Noto Sans TC", sans-serif';
      drawWrappedText(ctx, fb.d, 170, 1185, 740, 34);

      ctx.textAlign = 'center';
      ctx.fillStyle = '#777777';
      ctx.font = '700 24px "Noto Sans TC", sans-serif';
      ctx.fillText(`自認最強：${selfEval} ${TRAITS[selfEval].emoji}`, 540, 1243);
      ctx.fillStyle = '#3FA9F5';
      ctx.font = '900 24px "Noto Sans TC", sans-serif';
      ctx.fillText('一起來測測看你的職場代表動物吧！', 540, 1275);

      const blob = await canvasToBlob(canvas);
      return new File([blob], `職入你心_${topTrait}_測驗結果.png`, { type: 'image/png' });
    };

    const downloadResultFile = (resultFile) => {
      const imageUrl = URL.createObjectURL(resultFile);
      const a = document.createElement('a');
      a.href = imageUrl;
      a.download = resultFile.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(imageUrl), 1000);
    };

    const shareResult = async () => {
      setShareStatus('圖片產生中…');

      try {
        const resultFile = await generateResultImage();
        const shareData = { files: [resultFile] };

        // 只分享圖片本身，不帶文字、不帶網址。
        // 部分瀏覽器對 title/text/url + files 的組合會出現 parameter 相關錯誤，因此這裡只保留 files。
        if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
          await navigator.share(shareData);
          setShareStatus('已開啟分享視窗，僅附上測驗結果圖片');
        } else {
          downloadResultFile(resultFile);
          setShareStatus('✅ 已下載結果圖片');
        }
      } catch (error) {
        if (error && error.name === 'AbortError') {
          setShareStatus('');
          return;
        }
        console.error('分享失敗，改用下載圖片', error);
        try {
          const resultFile = await generateResultImage();
          downloadResultFile(resultFile);
          setShareStatus('✅ 已改用下載結果圖片');
        } catch (fallbackError) {
          console.error('下載結果圖片也失敗', fallbackError);
          setShareStatus('⚠️ 圖片產生失敗，請截圖結果或重新點一次');
        }
      }
    };

    const copyShareLink = async () => {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(QUIZ_SHARE_URL);
          setShareStatus('✅ 測驗連結已複製');
        } else {
          window.prompt('請複製測驗連結：', QUIZ_SHARE_URL);
          setShareStatus('請複製視窗中的測驗連結');
        }
      } catch (error) {
        console.error('複製連結失敗', error);
        window.prompt('請複製測驗連結：', QUIZ_SHARE_URL);
        setShareStatus('請複製視窗中的測驗連結');
      }
    };

    useEffect(() => {
      if (canvasRef.current) {
        new Chart(canvasRef.current, {
          type: 'radar',
          data: {
            labels: keys,
            datasets: [{
              data: keys.map(k => scores[k]),
              backgroundColor: topData.color + '80', // 半透明
              borderColor: topData.color,
              pointBackgroundColor: topData.color,
              borderWidth: 3,
            }]
          },
          options: { scales: { r: { min: 0, ticks: { display: false } } }, plugins: { legend: { display: false } } }
        });
      }
    }, []);

    useEffect(() => {
      const payload = {
        submittedAt: new Date().toISOString(),
        name: formData.n,
        employeeId: formData.id,
        department: formData.d,
        topTrait,
        selfEval,
        scores,
        answers: answers.map(a => a.l).join('')
      };

      sendToGoogleSheet(payload)
        .then(() => setSubmitStatus('sent'))
        .catch((error) => {
          console.error('送出資料失敗', error);
          setSubmitStatus('error');
        });
    }, []);

    return (
      <div className="screen card" style={{paddingTop: '20px'}}>
        <div className="result-hero">
          <div className="rh-title">你的職場代表動物是</div>
          <div className="rh-animal">{topData.emoji}</div>
          <h2 className="rh-trait" style={{color: topData.color}}>{topTrait}</h2>
        </div>
        
        <h3 style={{textAlign:'center', marginBottom:'15px', color:'#333'}}>職能光譜分佈</h3>
        <div className="radar-container"><canvas ref={canvasRef}></canvas></div>

        <div className="feedback-card">
          <div className="fc-title strength">✨ 你的超能力</div>
          <div>{fb.s}</div>
        </div>

        <div className="feedback-card" style={{background: '#FFF9E6'}}>
          <div className="fc-title develop">🌱 可以伸展的空間</div>
          <div>{fb.d}</div>
        </div>

        <div style={{textAlign:'center', padding:'15px', border:'2px dashed #E0E0E0', borderRadius:'16px'}}>
           <div style={{fontSize:'0.9rem', color:'#666'}}>你原本自認最強的是：<strong>{selfEval} {TRAITS[selfEval].emoji}</strong></div>
           <div style={{fontWeight:'bold', marginTop:'5px', color: selfEval === topTrait ? '#4CAF50' : '#FF9800'}}>
             {selfEval === topTrait ? "🎯 自我認知超精準！" : "💡 發現了意想不到的潛力！"}
           </div>
        </div>

        <div style={{textAlign:'center', marginTop:'15px', color:'#666', fontSize:'0.9rem'}}>
          {submitStatus === 'sending' && '資料送出中…'}
          {submitStatus === 'sent' && '✅ 已送出填答資料'}
          {submitStatus === 'error' && '⚠️ 資料送出失敗，請截圖結果或通知承辦人'}
        </div>

        <button className="btn-ghost" onClick={shareResult} style={{width: '100%', marginTop: '25px', background: '#FFFFFF'}}>
          分享結果圖片 ↗
        </button>

        <button className="btn-ghost" onClick={copyShareLink} style={{width: '100%', marginTop: '12px', background: '#FFFFFF'}}>
          複製測驗連結 🔗
        </button>

        {shareStatus && (
          <div style={{textAlign:'center', marginTop:'10px', color:'#666', fontSize:'0.9rem'}}>
            {shareStatus}
          </div>
        )}

        <button className="btn-primary" onClick={onNext} style={{marginTop: '15px'}}>
          探索六大職能資源 ➔
        </button>
      </div>
    );
  };

  // --- 探索資源頁面 ---
  const ExploreScreen = () => {
    return (
      <div className="screen card" style={{paddingTop: '30px'}}>
        <div className="result-hero" style={{borderBottom: 'none', paddingBottom: '0', marginBottom: '15px'}}>
          <h2 className="rh-trait" style={{color: 'var(--text-blue)', fontSize: '1.6rem', marginBottom: '10px'}}>六大職能資源</h2>
          <p style={{color: '#666', fontWeight: '700', fontSize: '0.95rem'}}>點擊下方可愛動物，<br/>前往各職能的專屬網站！</p>
        </div>
        
        <div className="explore-grid">
          {Object.keys(TRAITS).map(t => (
            <a 
              key={t} 
              href={TRAITS[t].link} 
              target="_blank" 
              className="explore-card" 
              style={{borderColor: TRAITS[t].color}}
              onClick={(e) => {
                // 如果目前還沒有真實網址，可以先取消下方的註解來測試跳出視窗
                // e.preventDefault(); alert(`即將前往「${t}」的網站！\n\n您可以隨時在程式碼 TRAITS 變數中，將 link 換成真實的內網網址。`);
              }}
            >
              <div className="ec-emoji">{TRAITS[t].emoji}</div>
              <div className="ec-title" style={{color: '#333'}}>{t}</div>
            </a>
          ))}
        </div>
        
        <button className="btn-ghost" onClick={() => window.location.reload()} style={{width: '100%', marginTop: '25px'}}>
          ⟲ 回到首頁重新測驗
        </button>
      </div>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
